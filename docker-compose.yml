services:
  rexadb:
    build: .
    container_name: rexadb-studio
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/rexadb.db"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STUDIO_JWT_SECRET: ${STUDIO_JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - rexadb-data:/app/data
    restart: unless-stopped

volumes:
  rexadb-data:
